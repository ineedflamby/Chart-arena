# /etc/nginx/sites-available/chart-arena
# 
# SETUP:
#   1. sudo apt install nginx certbot python3-certbot-nginx
#   2. sudo cp chart-arena /etc/nginx/sites-available/
#   3. sudo ln -s /etc/nginx/sites-available/chart-arena /etc/nginx/sites-enabled/
#   4. sudo rm /etc/nginx/sites-enabled/default
#   5. sudo nginx -t && sudo systemctl reload nginx
#   6. sudo certbot --nginx -d yourdomain.com  (skip if no domain yet)
#
# Without domain: replace "yourdomain.com" with the VPS IP, skip certbot,
# and use the http-only block below (still gives WS proxy).

# ── Rate limiting zones ──
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=ws_connect:10m rate=10r/m;

server {
    listen 80;
    server_name yourdomain.com;
    # Certbot will add the redirect to 443 automatically.
    # For IP-only (no TLS), uncomment the locations below and comment out the redirect.

